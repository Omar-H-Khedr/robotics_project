metadata:
  experiment_name: research_baseline_v0_7_controlled_robot_contact_validation_sequence
  description: Controlled low-force joint-space sequence for robot-to-object contact validation.
  controller_action_name: /joint_trajectory_controller/follow_joint_trajectory
  task_phase_topic: /task_phase
  notes: >
    The contact approach pose is intentionally conservative and very slow. The
    dedicated robot_contact_validation_pad in the separate validation world is
    tuned near the current robot_contact_hold gripper envelope with minimal
    expected penetration so this sequence can produce a real robot_validation
    contact event without disturbing the baseline task scene. If the robot model
    or gripper geometry changes, retune the pad from Gazebo observation before
    changing baseline task poses.

sequence:
  - safe_home
  - observe_scene
  - robot_contact_pre_approach
  - robot_contact_near_pad
  - robot_contact_touch_candidate
  - robot_contact_hold
  - robot_contact_retreat
  - return_home

poses:
  safe_home:
    positions: [0.0, -0.8, 1.2, 0.0, 0.8, 0.0]
    duration_sec: 6.0
    description: Raised parked configuration used as the robot contact validation start.
    safety_tag: nominal_clearance

  observe_scene:
    positions: [0.18, -0.92, 1.26, 0.0, 0.66, 0.0]
    duration_sec: 6.0
    description: Slow observation posture before moving toward the dedicated validation pad.
    safety_tag: observation_clearance

  robot_contact_pre_approach:
    positions: [0.36, -1.04, 1.28, 0.0, 0.52, 0.0]
    duration_sec: 8.0
    description: Slow staged posture outside the dedicated robot validation target.
    safety_tag: robot_validation_approach_region

  robot_contact_near_pad:
    positions: [0.43, -1.20, 1.42, 0.0, 0.34, 0.0]
    duration_sec: 10.0
    description: Very slow near-pad approach that remains conservative before the contact candidate pose.
    safety_tag: robot_validation_near_pad_region

  robot_contact_touch_candidate:
    positions: [0.465, -1.29, 1.50, 0.0, 0.22, 0.0]
    duration_sec: 12.0
    description: Low-aggression touch candidate with reduced depth into the validation pad envelope.
    safety_tag: robot_validation_contact_region

  robot_contact_hold:
    positions: [0.465, -1.29, 1.50, 0.0, 0.22, 0.0]
    duration_sec: 2.0
    description: Brief hold at the low-force candidate pose to allow robot_validation contact messages to be recorded.
    safety_tag: robot_validation_contact_hold

  robot_contact_retreat:
    positions: [0.30, -1.06, 1.30, 0.0, 0.50, 0.0]
    duration_sec: 8.0
    description: Slow retreat from the dedicated validation contact target.
    safety_tag: robot_validation_retreat_clearance

  return_home:
    positions: [0.0, -0.8, 1.2, 0.0, 0.8, 0.0]
    duration_sec: 6.0
    description: Return to the raised parked home configuration.
    safety_tag: nominal_clearance
