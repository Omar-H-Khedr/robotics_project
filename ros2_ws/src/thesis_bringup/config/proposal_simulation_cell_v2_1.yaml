simulation_cell_name: proposal_simulation_cell_v2_1_gazebo_motion_validation_suite

robot:
  robot_model: KUKA LBR iisy Gazebo support model
  gazebo_robot_model: lbr_iisy3_r760
  selected_primary_joint: joint_a6
  primary_controller_joint: joint_6
  selected_secondary_joint: joint_a5
  secondary_controller_joint: joint_5
  controller_joint_names:
    - joint_1
    - joint_2
    - joint_3
    - joint_4
    - joint_5
    - joint_6

gazebo_motion_validation_suite:
  simulation_engine: gazebo
  gazebo_only_motion_test: true
  control_interface: /joint_trajectory_controller/follow_joint_trajectory
  simulation_control_interface_used: gz_ros2_control/GazeboSimSystem via joint_trajectory_controller
  no_cartesian_motion: true
  no_peg_insertion: true
  no_contact_seeking_motion: true

motion_tests:
  primary_joint_delta_deg: 2.0
  secondary_joint_delta_deg: 1.0
  cycle_count: 3
  return_tolerance_deg: 0.25
  repeatability_tolerance_deg: 0.35
  max_motion_duration_per_command_sec: 5.0
  command_duration_sec: 2.0

safety_limits:
  max_allowed_force_n: 50.0
  max_allowed_torque_nm: 5.0
  emergency_stop_force_threshold_n: 45.0
  primary_joint_max_delta_deg: 2.0
  secondary_joint_max_delta_deg: 1.0

execution_policy:
  motion_execution_enabled: true
  gazebo_only_motion_test: true
  real_robot_allowed: false
  moveit_allowed: false
  compute_ik_allowed: false
  follow_joint_trajectory_allowed: gazebo_simulation_only
  real_robot_used: false
  learning_enabled: false
  scenario_batch_execution_enabled: false

validation:
  output_dir: diagnostics/proposal_simulation_cell_v2_1
  status_success: gazebo_motion_validation_suite_validated
  status_topic: /proposal_simulation_cell/motion_validation_suite_status
  joint_delta_report_topic: /proposal_simulation_cell/motion_validation_joint_delta_report
  repeatability_report_topic: /proposal_simulation_cell/motion_validation_repeatability_report
  safety_report_topic: /proposal_simulation_cell/motion_validation_safety_report
  contact_wrench_topic: /proposal_simulation_cell/contact_wrench
  joint_states_topic: /joint_states
  validation_timeout_sec: 90.0
  pre_motion_wait_sec: 2.0
